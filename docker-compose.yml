version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ppdb_db
    restart: always
    environment:
      MYSQL_DATABASE: ppdb_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: ppdb_user
      MYSQL_PASSWORD: ppdb_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./Backend
    container_name: ppdb_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost
      - DB_HOST=db
      - DB_USER=ppdb_user
      - DB_PASS=ppdb_password
      - DB_NAME=ppdb_db
      - JWT_SECRET=supersecretjwtkey123_change_this_later
    depends_on:
      - db

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ppdb_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  db_data:
